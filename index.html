<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Project Wala — Universal Web Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwindcss.config={theme:{extend:{fontFamily:{display:['Space Grotesk','sans-serif'],body:['DM Sans','sans-serif']}}}}
</script>
<style>
:root{--bg:#0b0f19;--bg2:#111827;--card:#1f2937;--border:#374151;--fg:#f3f4f6;--muted:#9ca3af;--accent:#10b981;--accent-dim:rgba(16,185,129,.1);--danger:#ef4444;--info:#3b82f6}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--fg);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.bg-mesh{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-mesh::before{content:'';position:absolute;width:600px;height:600px;top:-100px;right:-100px;background:radial-gradient(circle,rgba(16,185,129,.15) 0%,transparent 70%);animation:float 20s infinite}
.bg-mesh::after{content:'';position:absolute;width:500px;height:500px;bottom:-100px;left:-100px;background:radial-gradient(circle,rgba(59,130,246,.1) 0%,transparent 70%);animation:float 25s infinite reverse}
@keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,20px)}}
.mc{position:relative;z-index:2;max-width:1100px;margin:0 auto;padding:0 20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;transition:border-color .3s}
.inp{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--fg);width:100%;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--accent)}
.btn{background:var(--accent);color:#fff;font-weight:600;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.outline{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn.outline:hover{border-color:var(--accent);color:var(--accent)}
.btn.danger{background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.2)}
.btn.danger:hover{background:rgba(239,68,68,.2)}
.hidden{display:none}
.auth-container{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-box{width:100%;max-width:400px;padding:30px}
.toast-wrap{position:fixed;top:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--card);border-left:4px solid var(--accent);padding:12px 16px;border-radius:4px;box-shadow:0 4px 12px rgba(0,0,0,.3);font-size:14px;animation:slideIn .3s;min-width:250px}
.toast.err{border-left-color:var(--danger)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tog{width:40px;height:22px;background:var(--border);border-radius:11px;position:relative;cursor:pointer;transition:background .3s}
.tog.on{background:var(--accent)}
.tog-th{width:16px;height:16px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:transform .3s}
.tog.on .tog-th{transform:translateX(18px)}
.stat-card{padding:16px;border-radius:12px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;gap:12px}
.site-row{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border);transition:background .2s}
.site-row:last-child{border-bottom:none}
.site-row:hover{background:rgba(255,255,255,.02)}
.navbar{display:flex;align-items:center;justify-content:space-between;padding:16px 0;margin-bottom:30px;border-bottom:1px solid var(--border)}
@media(max-width:600px){.navbar{flex-direction:column;gap:16px;align-items:flex-start}.site-row{flex-direction:column;align-items:flex-start;gap:12px}.site-acts{width:100%;display:flex;justify-content:space-between;align-items:center}}
</style>
</head>
<body>

<div class="bg-mesh"></div>
<div class="toast-wrap" id="toasts"></div>

<!-- AUTH SECTION -->
<div id="authView" class="auth-container">
  <div class="auth-box card">
    <div style="text-align:center;margin-bottom:24px">
      <div style="width:50px;height:50px;background:var(--accent);border-radius:12px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center">
        <i class="fas fa-satellite-dish" style="color:#000;font-size:20px"></i>
      </div>
      <h2 style="font-family:'Space Grotesk';font-weight:700;font-size:22px">Web Monitor</h2>
      <p style="color:var(--muted);font-size:13px;margin-top:4px">Sign in to track your websites</p>
    </div>

    <!-- Login Form -->
    <div id="loginForm">
      <div style="margin-bottom:16px">
        <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:6px">Email Address</label>
        <input type="email" id="loginEmail" class="inp" placeholder="you@example.com">
      </div>
      <div style="margin-bottom:20px">
        <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:6px">Password</label>
        <input type="password" id="loginPass" class="inp" placeholder="••••••••">
      </div>
      <button class="btn" onclick="doLogin()" id="btnLogin">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
      <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--muted)">
        No account? <a href="#" onclick="switchAuth('signup')" style="color:var(--accent);text-decoration:none">Create one</a>
      </p>
    </div>

    <!-- Signup Form -->
    <div id="signupForm" class="hidden">
      <div style="margin-bottom:16px">
        <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:6px">Email Address</label>
        <input type="email" id="regEmail" class="inp" placeholder="you@example.com">
      </div>
      <div style="margin-bottom:16px">
        <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:6px">Create Password</label>
        <input type="password" id="regPass" class="inp" placeholder="••••••••">
      </div>
      <div style="margin-bottom:20px">
        <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:6px">Confirm Password</label>
        <input type="password" id="regPass2" class="inp" placeholder="••••••••">
      </div>
      <button class="btn" onclick="doSignup()" id="btnSignup">
        <i class="fas fa-user-plus"></i> Create Account
      </button>
      <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--muted)">
        Already have an account? <a href="#" onclick="switchAuth('login')" style="color:var(--accent);text-decoration:none">Login</a>
      </p>
    </div>
  </div>
</div>

<!-- APP SECTION -->
<div id="appView" class="mc hidden" style="padding-top:20px;padding-bottom:50px">
  
  <nav class="navbar">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center">
        <i class="fas fa-satellite-dish" style="color:#000;font-size:16px"></i>
      </div>
      <div>
        <h1 style="font-family:'Space Grotesk';font-weight:700;font-size:18px;line-height:1">Dashboard</h1>
        <div style="font-size:12px;color:var(--muted)" id="userDisplay">user@email.com</div>
      </div>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn outline" style="padding:8px 16px;font-size:13px" onclick="doCheckAll()">
        <i class="fas fa-sync"></i> Check All
      </button>
      <button class="btn danger" style="padding:8px 16px;font-size:13px" onclick="doLogout()">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
  </nav>

  <!-- Stats -->
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:30px">
    <div class="stat-card">
      <div style="width:40px;height:40px;background:rgba(16,185,129,.1);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--accent)">
        <i class="fas fa-globe"></i>
      </div>
      <div>
        <div style="font-size:24px;font-weight:700" id="statTotal">0</div>
        <div style="font-size:12px;color:var(--muted)">Tracked Sites</div>
      </div>
    </div>
    <div class="stat-card">
      <div style="width:40px;height:40px;background:rgba(16,185,129,.1);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--accent)">
        <i class="fas fa-bell"></i>
      </div>
      <div>
        <div style="font-size:24px;font-weight:700" id="statChanges">0</div>
        <div style="font-size:12px;color:var(--muted)">Changes Found</div>
      </div>
    </div>
  </div>

  <!-- Add Site -->
  <div class="card" style="padding:20px;margin-bottom:24px">
    <h3 style="font-family:'Space Grotesk';font-weight:600;font-size:16px;margin-bottom:16px">Add New Website</h3>
    <div style="display:grid;grid-template-columns:2fr 2fr 1fr 1fr auto;gap:10px;align-items:end">
      <div>
        <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px">Name</label>
        <input type="text" id="addName" class="inp" placeholder="Site Name" style="padding:8px">
      </div>
      <div>
        <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px">URL</label>
        <input type="url" id="addUrl" class="inp" placeholder="https://..." style="padding:8px">
      </div>
      <div>
        <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px">Keyword (Opt)</label>
        <input type="text" id="addKw" class="inp" placeholder="e.g. result" style="padding:8px">
      </div>
      <div>
        <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px">Check Freq</label>
        <select id="addFreq" class="inp" style="padding:8px">
          <option value="every-1h">Every Hour</option>
          <option value="every-6h">Every 6 Hours</option>
        </select>
      </div>
      <button class="btn" onclick="doAddSite()" style="height:38px">
        <i class="fas fa-plus"></i> Add
      </button>
    </div>
  </div>

  <!-- Sites List -->
  <div class="card" style="overflow:hidden">
    <div style="padding:16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <h3 style="font-family:'Space Grotesk';font-weight:600;font-size:15px">Monitored Websites</h3>
      <span style="font-size:12px;color:var(--muted)">Auto-Check: <span style="color:var(--accent)">Active (Server-side)</span></span>
    </div>
    <div id="sitesList">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- Recent Logs -->
  <div class="card" style="margin-top:24px;padding:20px">
    <h3 style="font-family:'Space Grotesk';font-weight:600;font-size:15px;margin-bottom:16px">Recent Notifications</h3>
    <div id="logsList" style="display:flex;flex-direction:column;gap:10px;max-height:300px;overflow-y:auto">
      <!-- Populated by JS -->
    </div>
  </div>

</div>

<!-- CONFIGURATION: PASTE YOUR BACKEND URL HERE -->
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwgaZb7JLn55wzPA3ydUAkR008dS54LBT4zozTwfad21eX9bGtZ8mVMV9k-VTRA62zRQw/exec";

let state = {
  token: localStorage.getItem('pw_token') || '',
  user: null,
  sites: [],
  logs: []
};

// --- AUTH LOGIC ---

function switchAuth(view) {
  if(view === 'signup') {
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('signupForm').classList.remove('hidden');
  } else {
    document.getElementById('signupForm').classList.add('hidden');
    document.getElementById('loginForm').classList.remove('hidden');
  }
}

async function doSignup() {
  const email = document.getElementById('regEmail').value.trim();
  const p1 = document.getElementById('regPass').value;
  const p2 = document.getElementById('regPass2').value;
  if(!email || !p1) return toast('Fill all fields', 'err');
  if(p1 !== p2) return toast('Passwords do not match', 'err');
  
  const btn = document.getElementById('btnSignup');
  btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner spin"></i> Creating...';
  
  try {
    const res = await api('signup', { email, password: p1 });
    if(res.success) {
      toast('Account created! Please login.');
      switchAuth('login');
      document.getElementById('signupForm').reset();
    } else {
      toast(res.error, 'err');
    }
  } catch(e) { toast(e.message, 'err'); }
  btn.disabled = false; btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  if(!email || !pass) return toast('Enter credentials', 'err');

  const btn = document.getElementById('btnLogin');
  btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner spin"></i> Logging in...';

  try {
    const res = await api('login', { email, password: pass });
    if(res.success) {
      state.token = res.token;
      state.user = { email: res.email, id: res.userId };
      localStorage.setItem('pw_token', res.token);
      initApp();
    } else {
      toast(res.error, 'err');
    }
  } catch(e) { toast(e.message, 'err'); }
  btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
}

function doLogout() {
  state.token = '';
  state.user = null;
  localStorage.removeItem('pw_token');
  document.getElementById('appView').classList.add('hidden');
  document.getElementById('authView').classList.remove('hidden');
  toast('Logged out');
}

// --- APP LOGIC ---

async function initApp() {
  if(!state.token) {
    document.getElementById('authView').classList.remove('hidden');
    document.getElementById('appView').classList.add('hidden');
    return;
  }

  try {
    const res = await api('getUserData', { token: state.token });
    if(res.success) {
      state.user = res.user;
      state.sites = res.sites || [];
      state.logs = res.logs || [];
      
      document.getElementById('authView').classList.add('hidden');
      document.getElementById('appView').classList.remove('hidden');
      document.getElementById('userDisplay').textContent = state.user.email;
      render();
    } else {
      doLogout(); // Token invalid
    }
  } catch(e) {
    toast("Connection Error", 'err');
  }
}

async function doAddSite() {
  const name = document.getElementById('addName').value.trim();
  let url = document.getElementById('addUrl').value.trim();
  const kw = document.getElementById('addKw').value.trim();
  const freq = document.getElementById('addFreq').value;

  if(!name || !url) return toast('Name and URL required', 'err');
  if(!url.startsWith('http')) url = 'https://' + url;

  try {
    const res = await api('addSite', { token: state.token, name, url, keyword: kw, frequency: freq });
    if(res.success) {
      toast('Site added successfully');
      document.getElementById('addName').value = '';
      document.getElementById('addUrl').value = '';
      document.getElementById('addKw').value = '';
      await refreshData();
    } else { toast(res.error, 'err'); }
  } catch(e) { toast(e.message, 'err'); }
}

async function doRemoveSite(id) {
  if(!confirm('Stop monitoring this site?')) return;
  try {
    const res = await api('removeSite', { token: state.token, id });
    if(res.success) {
      toast('Site removed');
      await refreshData();
    }
  } catch(e) { toast(e.message, 'err'); }
}

async function doToggleSite(id) {
  try {
    await api('toggleSite', { token: state.token, id });
    await refreshData();
  } catch(e) { toast(e.message, 'err'); }
}

async function doCheckSite(id) {
  try {
    const res = await api('checkSite', { token: state.token, id });
    if(res.changed) toast('Change detected! Email sent.', 'ok');
    else if(res.firstCheck) toast('Baseline recorded.', 'inf');
    else toast('No changes detected.', 'inf');
    await refreshData();
  } catch(e) { toast(e.message, 'err'); }
}

async function doCheckAll() {
  const btn = document.querySelector('button[onclick="doCheckAll()"]');
  const oldHtml = btn.innerHTML;
  btn.innerHTML = '<i class="fas fa-spinner spin"></i> Checking...';
  try {
    // Note: This checks manually. The server does this automatically too.
    for(const s of state.sites) {
      if(s.active) await doCheckSite(s.id);
    }
    toast('All sites checked');
  } catch(e) { toast(e.message, 'err'); }
  btn.innerHTML = oldHtml;
}

async function refreshData() {
  const res = await api('getUserData', { token: state.token });
  if(res.success) {
    state.sites = res.sites;
    state.logs = res.logs;
    render();
  }
}

function render() {
  // Stats
  document.getElementById('statTotal').innerText = state.sites.length;
  const changes = state.sites.reduce((acc, s) => acc + (s.changesFound || 0), 0);
  document.getElementById('statChanges').innerText = changes;

  // Sites List
  const sEl = document.getElementById('sitesList');
  if(state.sites.length === 0) {
    sEl.innerHTML = `<div style="padding:30px;text-align:center;color:var(--muted)">No sites monitored yet.</div>`;
  } else {
    sEl.innerHTML = state.sites.map(s => `
      <div class="site-row">
        <div style="display:flex;align-items:center;gap:12px;flex:1;min-width:0">
          <div style="width:32px;height:32px;background:#000;border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden">
             <img src="https://www.google.com/s2/favicons?domain=${s.url}&sz=32" alt="" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzM3NDE1MSI+PHBhdGggZD0iTTEyIDJDNi40OCAyIDIgNi40OCAyIDEyczQuNDggMTAgMTAgMTAgMTAtNC40OCAxMC0xMFMxNy41MiAyIDEyIDJ6bTEgMTdoLTJ2LTJoMnYyem0wLTRoLTJWN2gydjh6Ii8+PC9zdmc+'">
          </div>
          <div style="min-width:0">
            <div style="font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.name}</div>
            <div style="font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.url}</div>
          </div>
        </div>
        <div class="site-acts" style="display:flex;align-items:center;gap:12px">
          ${s.keyword ? `<span style="font-size:10px;padding:2px 6px;background:rgba(255,255,255,.05);border-radius:4px;color:var(--muted)">Kw: ${s.keyword}</span>` : ''}
          <div class="tog ${s.active ? 'on' : ''}" onclick="doToggleSite('${s.id}')"><div class="tog-th"></div></div>
          <button class="btn outline" style="padding:4px 10px;font-size:12px;height:30px" onclick="doCheckSite('${s.id}')"><i class="fas fa-sync"></i></button>
          <button class="btn danger" style="padding:4px 10px;font-size:12px;height:30px" onclick="doRemoveSite('${s.id}')"><i class="fas fa-trash"></i></button>
        </div>
      </div>
    `).join('');
  }

  // Logs
  const lEl = document.getElementById('logsList');
  if(state.logs.length === 0) {
    lEl.innerHTML = `<div style="padding:10px;text-align:center;color:var(--muted);font-size:13px">No recent notifications.</div>`;
  } else {
    lEl.innerHTML = state.logs.map(l => `
      <div style="padding:10px;background:rgba(255,255,255,.02);border-radius:6px;font-size:13px;border-left:3px solid ${l.type === 'email' ? 'var(--accent)' : 'var(--muted)'}">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <strong style="color:var(--fg)">${l.siteName}</strong>
          <span style="font-size:11px;color:var(--muted)">${timeAgo(l.time)}</span>
        </div>
        <div style="color:var(--muted)">${l.message}</div>
      </div>
    `).join('');
  }
}

// --- UTILS ---

async function api(action, data) {
  const u = new URL(API_URL);
  u.searchParams.set('action', action);
  for(const k in data) u.searchParams.set(k, data[k]);
  const req = await fetch(u.toString(), { redirect: 'follow' });
  const txt = await req.text();
  try { return JSON.parse(txt); } 
  catch { throw new Error('Server Error: ' + txt); }
}

function toast(msg, type='ok') {
  const w = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = 'toast ' + (type==='err'?'err':'');
  t.innerText = msg;
  w.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 3000);
}

function timeAgo(dateStr) {
  if(!dateStr) return '';
  const d = new Date(dateStr);
  const sec = Math.floor((new Date() - d) / 1000);
  if(sec < 60) return 'Just now';
  if(sec < 3600) return Math.floor(sec/60) + 'm ago';
  if(sec < 86400) return Math.floor(sec/3600) + 'h ago';
  return d.toLocaleDateString();
}

// Init
initApp();

</script>
</body>
</html>
